# Fly.io — https://fly.io/docs/languages-and-frameworks/node/
# From this directory: fly launch (first time) → fly deploy

app = 'who-knocked-over-the-plant'
primary_region = 'lhr'

[build]

[http_service]
  internal_port = 3456
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "20s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[env]
  PORT = "3456"
  ALLOWED_ORIGINS = "https://mtaylor.github.io"
