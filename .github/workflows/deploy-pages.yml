name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # secrets.* cannot be used in step if: — check inside the script instead
      - name: Inject multiplayer server URL (Who Knocked Over the Plant)
        env:
          WKOTP_RENDER_URL: ${{ secrets.WKOTP_RENDER_URL }}
        run: |
          if [ -z "${WKOTP_RENDER_URL:-}" ]; then
            echo "WKOTP_RENDER_URL not set; using deploy-config.js from the repo."
            exit 0
          fi
          FILE=games/who-knocked-over-the-plant/public/js/deploy-config.js
          ESCAPED=$(printf '%s' "$WKOTP_RENDER_URL" | sed "s/'/'\\\\''/g")
          sed -i.bak "s|export const REMOTE_SERVER_URL = '[^']*';|export const REMOTE_SERVER_URL = '${ESCAPED}';|" "$FILE"
          rm -f "${FILE}.bak"

      # Pages must exist before configure-pages. API calls need Content-Type: application/json.
      - name: Enable GitHub Pages (workflow source)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          SETTINGS="https://github.com/${GITHUB_REPOSITORY}/settings/pages"
          AUTH=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
          AUTH+=(-H "Accept: application/vnd.github+json")
          AUTH+=(-H "X-GitHub-Api-Version: 2022-11-28")
          AUTH+=(-H "Content-Type: application/json")

          fail_manual() {
            echo "::error::GitHub Pages is not enabled for this repository."
            echo "One-time fix: ${SETTINGS}"
            echo "Set Build and deployment → Source → GitHub Actions, then re-run this workflow."
            echo "Also ensure Settings → Actions → General → Workflow permissions is Read and write."
            exit 1
          }

          CODE=$(curl -sS -o /tmp/pages-get.json -w "%{http_code}" "${AUTH[@]}" "$API")
          echo "GET /pages → HTTP ${CODE}"

          if [ "$CODE" = "404" ]; then
            echo "Creating Pages site (build_type=workflow)..."
            POST_CODE=$(curl -sS -o /tmp/pages-post.json -w "%{http_code}" "${AUTH[@]}" -X POST "$API" \
              -d '{"build_type":"workflow"}')
            echo "POST /pages → HTTP ${POST_CODE}"
            cat /tmp/pages-post.json 2>/dev/null || true
            case "$POST_CODE" in
              201|200|409) echo "Pages site ready." ;;
              *) fail_manual ;;
            esac
          elif [ "$CODE" = "200" ]; then
            BUILD_TYPE=$(jq -r '.build_type // empty' /tmp/pages-get.json)
            echo "Pages exists (build_type=${BUILD_TYPE})"
            if [ "$BUILD_TYPE" != "workflow" ]; then
              echo "Switching to GitHub Actions workflow source..."
              PUT_CODE=$(curl -sS -o /tmp/pages-put.json -w "%{http_code}" "${AUTH[@]}" -X PUT "$API" \
                -d '{"build_type":"workflow"}')
              echo "PUT /pages → HTTP ${PUT_CODE}"
              cat /tmp/pages-put.json 2>/dev/null || true
              case "$PUT_CODE" in
                200|204) echo "Pages source updated." ;;
                *) fail_manual ;;
              esac
            fi
          else
            cat /tmp/pages-get.json 2>/dev/null || true
            fail_manual
          fi

      - uses: actions/configure-pages@v6
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v5
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
