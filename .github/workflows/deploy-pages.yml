name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      # secrets.* cannot be used in step if: — check inside the script instead
      - name: Inject multiplayer server URL (Who Knocked Over the Plant)
        env:
          WKOTP_RENDER_URL: ${{ secrets.WKOTP_RENDER_URL }}
        run: |
          if [ -z "${WKOTP_RENDER_URL:-}" ]; then
            echo "WKOTP_RENDER_URL not set; using deploy-config.js from the repo."
            exit 0
          fi
          FILE=games/who-knocked-over-the-plant/public/js/deploy-config.js
          ESCAPED=$(printf '%s' "$WKOTP_RENDER_URL" | sed "s/'/'\\\\''/g")
          sed -i.bak "s|export const REMOTE_SERVER_URL = '[^']*';|export const REMOTE_SERVER_URL = '${ESCAPED}';|" "$FILE"
          rm -f "${FILE}.bak"

      # Pages must exist with build_type "workflow" before configure-pages runs.
      # If this step fails with 403, enable manually: Settings → Pages → Source: GitHub Actions.
      - name: Ensure GitHub Pages (workflow build)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          API="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          AUTH=(-H "Authorization: Bearer ${GITHUB_TOKEN}")
          AUTH+=(-H "Accept: application/vnd.github+json")
          AUTH+=(-H "X-GitHub-Api-Version: 2022-11-28")

          CODE=$(curl -sS -o /tmp/pages.json -w "%{http_code}" "${AUTH[@]}" "$API")

          if [ "$CODE" = "404" ]; then
            echo "Creating GitHub Pages site (workflow source)..."
            curl -sS -f -X POST "${AUTH[@]}" "$API" \
              -d '{"build_type":"workflow"}'
          elif [ "$CODE" = "200" ]; then
            BUILD_TYPE=$(jq -r '.build_type // empty' /tmp/pages.json)
            echo "Pages site exists (build_type=${BUILD_TYPE})"
            if [ "$BUILD_TYPE" != "workflow" ]; then
              echo "Switching Pages source to GitHub Actions..."
              curl -sS -f -X PUT "${AUTH[@]}" "$API" \
                -d '{"build_type":"workflow"}'
            fi
          else
            echo "Unexpected GET /pages status: $CODE"
            cat /tmp/pages.json
            exit 1
          fi

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v5
